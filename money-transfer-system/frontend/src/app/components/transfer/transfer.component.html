<div class="container mt-4" style="max-width: 600px;">
  <div class="card">
    <div class="card-header text-center mb-4">
      <h2>Transfer Money</h2>
      <p>Send funds securely to another account.</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="success-message">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <form #transferForm="ngForm" (ngSubmit)="transfer(transferForm)">
      <div class="form-group">
        <label for="toAccount">Recipient Account ID</label>
        <div class="input-wrapper">
          <input type="number" id="toAccount" [(ngModel)]="toAccount" name="toAccount"
            placeholder="Enter account ID" required />
        </div>
      </div>

      <div class="form-group">
        <label for="amount">Amount ($)</label>
        <div class="input-wrapper">
          <input type="number" id="amount" [(ngModel)]="amount" name="amount" placeholder="0.00" min="1" step="0.01"
            required />
        </div>
      </div>

      <div class="form-actions mt-4">
        <button type="submit" class="btn w-full" [disabled]="transferForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Sending...' : 'Send Money' }}
        </button>
      </div>
    </form>
  </div>
</div>
